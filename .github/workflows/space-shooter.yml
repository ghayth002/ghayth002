name: GitHub Space Shooter Game

on:
  # Run daily at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual triggering
  workflow_dispatch:
  # Trigger on pushes to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Checkout the repository (fetch-depth: 2 is required for amend to work)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Step 2: Create output directory
      - name: Create dist directory
        run: mkdir -p dist

      # Step 3: Generate the Space Shooter GIF
      - name: Generate Space Shooter Animation
        uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: "dist/space-shooter.gif"
          strategy: "random"
          fps: 40

      # Step 3: Deploy to output branch
      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update space shooter animation [skip ci]"
